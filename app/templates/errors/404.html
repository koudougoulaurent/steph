{% extends 'base.html' %}
{% block title %}Page introuvable — VégéSuivi Pro{% endblock %}

{% block content %}
<div class="container py-5 text-center">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-5">
          <div class="mb-4">
            <i class="bi bi-search text-warning" style="font-size: 5rem;"></i>
          </div>
          <h1 class="display-6 fw-bold text-warning">404</h1>
          <h2 class="h4 mb-3">Page introuvable</h2>
          <p class="text-muted mb-4">
            La page que vous recherchez n'existe pas ou a été déplacée.<br>
            Vérifiez l'adresse ou utilisez les liens de navigation.
          </p>
          <div class="d-flex gap-2 justify-content-center">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-success">
              <i class="bi bi-house-fill me-2"></i>Tableau de bord
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-2"></i>Retour
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
