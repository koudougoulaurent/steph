services:
  - type: web
    name: vegesuivi-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120 --preload
    envVars:
      - key: FLASK_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false          # À renseigner manuellement depuis Neon
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
    healthCheckPath: /
